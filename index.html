<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mercenary Manager Prototype</title>
	<link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Mercenary Manager Prototype</h1>

        <div class="info">
            <p><strong>Instructions:</strong> Drag troop cards into the 2 mission slots. Release near a slot to snap it in place, or it returns to the pool.</p>
			<button id="newWeekButton">Next Week</button>
            <button id="resetSlots">Reset</button>
        </div>

		<div class="main-container">
			<div>
        		<h2 style="margin-bottom: 15px;">Troops</h2>
				<div class="troop-pool" id="troopPool">
					<div class="troop-card" draggable="true" data-id="A"><img draggable="false"/></div>
					<div class="troop-card" draggable="true" data-id="B"><img draggable="false"/></div>
					<div class="troop-card" draggable="true" data-id="C"><img draggable="false"/></div>
					<div class="troop-card" draggable="true" data-id="D"><img draggable="false"/></div>
					<div class="troop-card" draggable="true" data-id="E"><img draggable="false"/></div>
					<div class="troop-card" draggable="true" data-id="F"><img draggable="false"/></div>
				</div>
			</div>

			<div>
				<h2 style="margin-bottom: 15px;">Missions Slot</h2>
				<div class="slots-container" id="slotsContainer">
					<div>
						<button class="mission-button" data-num="0">Prepare Mission</button>
						<div class="slot" data-num="0" data-frozen-text="ONGOING MISSION"></div>
					</div>
					<div>
						<button class="mission-button" data-num="1">Prepare Mission</button>
						<div class="slot" data-num="1" data-frozen-text="ONGOING MISSION"></div>
					</div>
				</div>
			</div>
		</div>
    </div>

	<dialog id="missionDialog">
			<div style="position: relative; display: inline-block;">
				<svg style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;">
					<circle cx="200" cy="189" r="15" class="region" data-location="A" />
					<circle cx="530" cy="85" r="15" class="region" data-location="B" />
					<circle cx="625" cy="300" r="15" class="region" data-location="C" />
				</svg>

				<img src="images/map.png" draggable="false" style="width: 818px;"/>
				<div style="position: absolute; top: 0; left: 0; height: 32px; display: flex; align-items: center; gap: 5px;">
					<img src="images/fb671.png" draggable="false"/>
					<input type="text" id="suppliesAmount" required minlength="1" maxlength="4" size="5" draggable="false"/>
					/ 
					<div style="display: flex; flex-direction: column; gap: 0;">
						<button id="suppliesUp" style="height: 16px; padding: 0; margin: 0; border: none; background: none;"><img src="images/fa647.png" draggable="false"/></button>	
						<button id="suppliesDown" style="height: 16px; padding: 0; margin: 0; border: none; background: none;"><img src="images/fa648.png" draggable="false"/></button>	
					</div>
				</div>
				
				<div class="tooltip" id="tooltip">
					<span class="tooltiptext" id="tooltiptext">Some tooltip text</span>
				</div>
			</div>
			<button id="sendMission" disabled="true">Send mission</button>
			<button id="cancelMission">Cancel mission</button>
	</dialog>


    <script type="module" src="main.js"></script>
</body>
</html>
